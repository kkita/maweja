name: Build Android — MAWEJA (Client + Driver)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read
  actions: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-client-android:
    name: "MAWEJA Client — Android"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances racine
        run: npm install

      - name: Build Vite — App Client (maweja.net)
        env:
          VITE_MOBILE_MODE: client
          VITE_API_BASE_URL: https://maweja.net
        run: npx vite build --config vite.mobile.config.ts

      - name: Installer les dépendances Capacitor (Client)
        working-directory: mobile/client
        run: npm install

      - name: Initialiser la plateforme Android (Client)
        working-directory: mobile/client
        run: npx cap add android || true

      - name: Synchroniser Capacitor Android (Client)
        working-directory: mobile/client
        run: npx cap sync android

      - name: Copier les icônes launcher MAWEJA (Client)
        run: |
          REPO_RES="android/app/src/main/res"
          CAP_RES="mobile/client/android/app/src/main/res"

          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$CAP_RES/$density"
            cp "$REPO_RES/$density/ic_launcher.png" "$CAP_RES/$density/ic_launcher.png"
            cp "$REPO_RES/$density/ic_launcher_round.png" "$CAP_RES/$density/ic_launcher_round.png"
            cp "$REPO_RES/$density/ic_launcher_foreground.png" "$CAP_RES/$density/ic_launcher_foreground.png"
          done
          echo "✓ Icônes launcher MAWEJA copiées (Client)"

      - name: Copier les icônes de notification et splash (Client)
        run: |
          REPO_RES="android/app/src/main/res"
          CAP_RES="mobile/client/android/app/src/main/res"

          for density in drawable-mdpi drawable-hdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
            mkdir -p "$CAP_RES/$density"
            cp "$REPO_RES/$density/ic_stat_notify.png" "$CAP_RES/$density/ic_stat_notify.png"
            cp "$REPO_RES/$density/ic_notif_large.png" "$CAP_RES/$density/ic_notif_large.png"
            cp "$REPO_RES/$density/splash_logo.png" "$CAP_RES/$density/splash_logo.png"
          done
          echo "✓ Icônes notification + splash copiées (Client)"

      - name: Copier la config splash screen Android (Client)
        run: |
          REPO_RES="android/app/src/main/res"
          CAP_RES="mobile/client/android/app/src/main/res"

          mkdir -p "$CAP_RES/drawable" "$CAP_RES/drawable-v31"
          cp "$REPO_RES/drawable/splash_screen.xml" "$CAP_RES/drawable/splash_screen.xml"
          cp "$REPO_RES/drawable/splash_logo.png" "$CAP_RES/drawable/splash_logo.png"
          cp "$REPO_RES/drawable-v31/splash_logo.png" "$CAP_RES/drawable-v31/splash_logo.png"

          mkdir -p "$CAP_RES/values" "$CAP_RES/values-v31"
          cp "$REPO_RES/values/colors.xml" "$CAP_RES/values/colors.xml"
          cp "$REPO_RES/values/styles.xml" "$CAP_RES/values/styles.xml"
          cp "$REPO_RES/values-v31/styles.xml" "$CAP_RES/values-v31/styles.xml"

          echo "✓ Config splash (styles, colors, drawable) copiée (Client)"

      - name: Appliquer le thème splash dans AndroidManifest (Client)
        working-directory: mobile/client/android/app/src/main
        run: |
          python3 << 'EOF'
          content = open('AndroidManifest.xml').read()
          content = content.replace('android:theme="@style/AppTheme"', 'android:theme="@style/AppTheme.Splash"')
          open('AndroidManifest.xml', 'w').write(content)
          print('✓ Thème splash appliqué dans AndroidManifest (Client)')
          EOF

      - name: Injecter setTheme dans MainActivity (Client)
        run: |
          MAIN_ACTIVITY=$(find mobile/client/android -name "MainActivity.java" | head -1)
          if [ -n "$MAIN_ACTIVITY" ]; then
            python3 << EOF
          content = open('$MAIN_ACTIVITY').read()
          if 'setTheme' not in content:
              content = content.replace(
                  'super.onCreate(savedInstanceState);',
                  'setTheme(R.style.AppTheme);\n        super.onCreate(savedInstanceState);'
              )
              open('$MAIN_ACTIVITY', 'w').write(content)
              print('✓ setTheme injecté dans MainActivity (Client)')
          else:
              print('ℹ setTheme déjà présent')
          EOF
          fi

      - name: Injecter les permissions Android (Client)
        working-directory: mobile/client/android/app/src/main
        run: |
          python3 << 'EOF'
          content = open('AndroidManifest.xml').read()
          permissions = """
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          """
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('</manifest>', permissions + '\n</manifest>')
              open('AndroidManifest.xml', 'w').write(content)
              print('✓ Permissions injectées (Client)')
          else:
              print('ℹ Permissions déjà présentes')
          EOF

      - name: Build APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: mobile/client/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-debug-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Décoder le Keystore (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.CLIENT_KEYSTORE_BASE64 }}" | base64 --decode > mobile/client/android/keystore.jks

      - name: Build AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/client/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.CLIENT_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CLIENT_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CLIENT_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-release-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

