name: Build Android — MAWEJA (Client + Driver)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  # ══════════════════════════════════════════════════════
  #  APP CLIENT — com.edcorp.maweja (Android)
  # ══════════════════════════════════════════════════════
  build-client-android:
    name: "MAWEJA Client — Android"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances racine
        run: npm install

      - name: Build Vite — App Client (maweja.net)
        env:
          VITE_MOBILE_MODE: client
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://maweja.net' }}
        run: npx vite build --config vite.mobile.config.ts

      - name: Installer les dépendances Capacitor (Client)
        working-directory: mobile/client
        run: npm install

      - name: Initialiser la plateforme Android (Client)
        working-directory: mobile/client
        run: npx cap add android

      - name: Synchroniser Capacitor Android (Client)
        working-directory: mobile/client
        run: npx cap sync android

      # ── Icônes MAWEJA ──
      - name: Générer les icônes launcher MAWEJA (Client)
        run: |
          ICON_SRC="client/public/logo.png"
          ANDROID_RES="mobile/client/android/app/src/main/res"

          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )
          declare -A FG_SIZES=(
            ["mipmap-mdpi"]=108
            ["mipmap-hdpi"]=162
            ["mipmap-xhdpi"]=216
            ["mipmap-xxhdpi"]=324
            ["mipmap-xxxhdpi"]=432
          )

          for density in "${!SIZES[@]}"; do
            SIZE=${SIZES[$density]}
            mkdir -p "$ANDROID_RES/$density"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$ANDROID_RES/$density/ic_launcher.png"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$ANDROID_RES/$density/ic_launcher_round.png"
            FG=${FG_SIZES[$density]}
            convert "$ICON_SRC" -resize ${FG}x${FG} "$ANDROID_RES/$density/ic_launcher_foreground.png"
          done

          # Icône notification (blanc sur transparent pour Android 8+)
          mkdir -p "$ANDROID_RES/drawable"
          convert "$ICON_SRC" -resize 96x96 \
            -colorspace Gray -threshold 50% \
            "$ANDROID_RES/drawable/ic_stat_notify.png"

          echo "✓ Icônes MAWEJA générées pour Client"

      # ── Permissions Android ──
      - name: Injecter les permissions Android (Client)
        working-directory: mobile/client/android/app/src/main
        run: |
          python3 << 'EOF'
          content = open('AndroidManifest.xml').read()
          permissions = """
              <!-- Géolocalisation -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <!-- Notifications -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <!-- Caméra & Médias -->
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <!-- Réseau -->
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          """
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('</manifest>', permissions + '\n</manifest>')
              open('AndroidManifest.xml', 'w').write(content)
              print('✓ Permissions injectées (Client)')
          else:
              print('ℹ Permissions déjà présentes')
          EOF

      # ── Build Debug ──
      - name: Build APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: mobile/client/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-debug-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Build Release ──
      - name: Décoder le Keystore (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.CLIENT_KEYSTORE_BASE64 }}" | base64 --decode > mobile/client/android/keystore.jks

      - name: Build AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/client/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.CLIENT_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CLIENT_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CLIENT_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-release-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

  # ══════════════════════════════════════════════════════
  #  APP DRIVER — com.edcorp.maweja.driver (Android)
  # ══════════════════════════════════════════════════════
  build-driver-android:
    name: "MAWEJA Driver — Android"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances racine
        run: npm install

      - name: Build Vite — App Driver (maweja.net)
        env:
          VITE_MOBILE_MODE: driver
          VITE_API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://maweja.net' }}
        run: npx vite build --config vite.mobile.config.ts

      - name: Installer les dépendances Capacitor (Driver)
        working-directory: mobile/driver
        run: npm install

      - name: Initialiser la plateforme Android (Driver)
        working-directory: mobile/driver
        run: npx cap add android

      - name: Synchroniser Capacitor Android (Driver)
        working-directory: mobile/driver
        run: npx cap sync android

      # ── Icônes MAWEJA ──
      - name: Générer les icônes launcher MAWEJA (Driver)
        run: |
          ICON_SRC="client/public/logo.png"
          ANDROID_RES="mobile/driver/android/app/src/main/res"

          declare -A SIZES=(
            ["mipmap-mdpi"]=48
            ["mipmap-hdpi"]=72
            ["mipmap-xhdpi"]=96
            ["mipmap-xxhdpi"]=144
            ["mipmap-xxxhdpi"]=192
          )
          declare -A FG_SIZES=(
            ["mipmap-mdpi"]=108
            ["mipmap-hdpi"]=162
            ["mipmap-xhdpi"]=216
            ["mipmap-xxhdpi"]=324
            ["mipmap-xxxhdpi"]=432
          )

          for density in "${!SIZES[@]}"; do
            SIZE=${SIZES[$density]}
            mkdir -p "$ANDROID_RES/$density"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$ANDROID_RES/$density/ic_launcher.png"
            convert "$ICON_SRC" -resize ${SIZE}x${SIZE} "$ANDROID_RES/$density/ic_launcher_round.png"
            FG=${FG_SIZES[$density]}
            convert "$ICON_SRC" -resize ${FG}x${FG} "$ANDROID_RES/$density/ic_launcher_foreground.png"
          done

          mkdir -p "$ANDROID_RES/drawable"
          convert "$ICON_SRC" -resize 96x96 \
            -colorspace Gray -threshold 50% \
            "$ANDROID_RES/drawable/ic_stat_notify.png"

          echo "✓ Icônes MAWEJA générées pour Driver"

      # ── Permissions Android ──
      - name: Injecter les permissions Android (Driver)
        working-directory: mobile/driver/android/app/src/main
        run: |
          python3 << 'EOF'
          content = open('AndroidManifest.xml').read()
          permissions = """
              <!-- Géolocalisation (obligatoire pour le livreur) -->
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />
              <!-- Notifications -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.VIBRATE" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
              <!-- Caméra & Médias -->
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />
              <!-- Réseau -->
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          """
          if 'ACCESS_FINE_LOCATION' not in content:
              content = content.replace('</manifest>', permissions + '\n</manifest>')
              open('AndroidManifest.xml', 'w').write(content)
              print('✓ Permissions injectées (Driver)')
          else:
              print('ℹ Permissions déjà présentes')
          EOF

      # ── Build Debug ──
      - name: Build APK Debug (Driver)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: mobile/driver/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Debug (Driver)
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-driver-debug-${{ github.run_number }}
          path: mobile/driver/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Build Release ──
      - name: Décoder le Keystore (Driver)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.DRIVER_KEYSTORE_BASE64 }}" | base64 --decode > mobile/driver/android/keystore.jks

      - name: Build AAB Release (Driver)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/driver/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.DRIVER_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.DRIVER_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.DRIVER_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload AAB Release (Driver)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-driver-release-${{ github.run_number }}
          path: mobile/driver/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90
