name: Build Android — MAWEJA (Client + Driver)

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

permissions:
  contents: read
  actions: write

env:
  NODE_VERSION: '20'
  JAVA_VERSION: '17'

jobs:
  build-client-android:
    name: "MAWEJA Client — Android"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Installer les dépendances racine
        run: npm install

      - name: Nettoyer les artefacts TS compilés (shared/client/server)
        run: |
          find shared -type f \( -name "*.js" -o -name "*.d.ts" -o -name "*.js.map" \) ! -name "vite-env.d.ts" -delete || true
          find client/src -type f \( -name "*.js" -o -name "*.d.ts" -o -name "*.js.map" \) ! -name "vite-env.d.ts" -delete || true
          find server -type f \( -name "*.js" -o -name "*.d.ts" -o -name "*.js.map" \) -delete || true
          rm -f *.tsbuildinfo **/*.tsbuildinfo || true

      - name: Build Vite — App Client (maweja.net)
        env:
          VITE_MOBILE_MODE: client
          VITE_API_BASE_URL: https://maweja.net
        run: npx vite build --config vite.mobile.config.ts

      - name: Installer les dépendances Capacitor (Client)
        working-directory: mobile/client
        run: npm install

      - name: Initialiser la plateforme Android (Client)
        working-directory: mobile/client
        run: |
          rm -rf android
          npx cap add android

      - name: Synchroniser Capacitor Android (Client)
        working-directory: mobile/client
        run: npx cap sync android

      - name: Configurer Firebase Cloud Messaging (Client)
        run: |
          # 1. Copier google-services.json (package com.edcorp.maweja)
          cp mobile/client/firebase/google-services.json mobile/client/android/app/google-services.json
          echo "✓ google-services.json copié"

          # 2. Ajouter le classpath google-services dans le build.gradle racine
          PROJECT_GRADLE="mobile/client/android/build.gradle"
          if ! grep -q "com.google.gms:google-services" "$PROJECT_GRADLE"; then
            sed -i "/classpath 'com.android.tools.build:gradle/a\\        classpath 'com.google.gms:google-services:4.4.2'" "$PROJECT_GRADLE"
            echo "✓ Classpath google-services ajouté au build.gradle racine"
          fi

          # 3. Appliquer le plugin google-services dans app/build.gradle
          APP_GRADLE="mobile/client/android/app/build.gradle"
          if ! grep -q "com.google.gms.google-services" "$APP_GRADLE"; then
            echo "" >> "$APP_GRADLE"
            echo "apply plugin: 'com.google.gms.google-services'" >> "$APP_GRADLE"
            echo "✓ Plugin google-services appliqué dans app/build.gradle"
          fi

      - name: Copier les icônes launcher MAWEJA (Client)
        run: |
          ICON_SRC="android/client-icons"
          CAP_RES="mobile/client/android/app/src/main/res"

          for density in mipmap-mdpi mipmap-hdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            mkdir -p "$CAP_RES/$density"
            cp "$ICON_SRC/$density/ic_launcher.png" "$CAP_RES/$density/ic_launcher.png"
            cp "$ICON_SRC/$density/ic_launcher_round.png" "$CAP_RES/$density/ic_launcher_round.png"
            cp "$ICON_SRC/$density/ic_launcher_foreground.png" "$CAP_RES/$density/ic_launcher_foreground.png"
          done
          echo "✓ Icônes launcher MAWEJA Client copiées"

      - name: Copier les icônes de notification et splash (Client)
        run: |
          REPO_RES="android/app/src/main/res"
          CAP_RES="mobile/client/android/app/src/main/res"

          for density in drawable-mdpi drawable-hdpi drawable-xhdpi drawable-xxhdpi drawable-xxxhdpi; do
            mkdir -p "$CAP_RES/$density"
            cp "$REPO_RES/$density/ic_stat_notify.png" "$CAP_RES/$density/ic_stat_notify.png"
            cp "$REPO_RES/$density/ic_notif_large.png" "$CAP_RES/$density/ic_notif_large.png"
            [ -f "$REPO_RES/$density/splash_logo.png" ] && cp "$REPO_RES/$density/splash_logo.png" "$CAP_RES/$density/splash_logo.png"
          done

          mkdir -p "$CAP_RES/drawable" "$CAP_RES/drawable-v31"
          [ -f "$REPO_RES/drawable/splash_logo.png" ] && cp "$REPO_RES/drawable/splash_logo.png" "$CAP_RES/drawable/splash_logo.png"
          [ -f "$REPO_RES/drawable/splash_screen.xml" ] && cp "$REPO_RES/drawable/splash_screen.xml" "$CAP_RES/drawable/splash_screen.xml"
          [ -f "$REPO_RES/drawable-v31/splash_logo.png" ] && cp "$REPO_RES/drawable-v31/splash_logo.png" "$CAP_RES/drawable-v31/splash_logo.png"

          echo "✓ Icônes notification + splash copiées (Client)"

      - name: Configurer thèmes Android — splash rouge + system bars dynamiques (Client)
        run: |
          REPO_RES="android/app/src/main/res"
          CAP_RES="mobile/client/android/app/src/main/res"

          # Mode clair (défaut)
          mkdir -p "$CAP_RES/values" "$CAP_RES/values-v31"
          cp "$REPO_RES/values/colors.xml"      "$CAP_RES/values/colors.xml"
          cp "$REPO_RES/values/styles.xml"      "$CAP_RES/values/styles.xml"
          cp "$REPO_RES/values-v31/styles.xml"  "$CAP_RES/values-v31/styles.xml"

          # Mode sombre (night) — system bars noires + icônes claires
          mkdir -p "$CAP_RES/values-night" "$CAP_RES/values-night-v31"
          cp "$REPO_RES/values-night/colors.xml"       "$CAP_RES/values-night/colors.xml"
          cp "$REPO_RES/values-night/styles.xml"       "$CAP_RES/values-night/styles.xml"
          cp "$REPO_RES/values-night-v31/styles.xml"   "$CAP_RES/values-night-v31/styles.xml"

          echo "✓ Thèmes Android configurés — splash rouge intact, system bars dynamiques (Client)"

      - name: Injecter les permissions Android (Client)
        run: |
          MANIFEST="mobile/client/android/app/src/main/AndroidManifest.xml"
          if [ ! -f "$MANIFEST" ]; then
            echo "❌ AndroidManifest.xml introuvable à $MANIFEST"
            echo "Contenu de mobile/client/android/:"
            find mobile/client/android/ -name "*.xml" 2>/dev/null || echo "(aucun xml trouvé)"
            exit 1
          fi
          if ! grep -q "ACCESS_FINE_LOCATION" "$MANIFEST"; then
            sed -i 's|</manifest>|    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_BACKGROUND_LOCATION" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />\n    <uses-permission android:name="android.permission.FOREGROUND_SERVICE_LOCATION" />\n    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n    <uses-permission android:name="android.permission.VIBRATE" />\n    <uses-permission android:name="android.permission.WAKE_LOCK" />\n    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />\n</manifest>|' "$MANIFEST"
            echo "✓ Permissions injectées (Client)"
          else
            echo "ℹ Permissions déjà présentes (Client)"
          fi

      - name: Build APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        working-directory: mobile/client/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK Debug (Client)
        if: ${{ github.event.inputs.build_type != 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-debug-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Décoder le Keystore (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          echo "${{ secrets.CLIENT_KEYSTORE_BASE64 }}" | base64 --decode > mobile/client/android/keystore.jks

      - name: Build AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/client/android
        env:
          KEYSTORE_PATH: keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.CLIENT_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.CLIENT_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.CLIENT_KEY_PASSWORD }}
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$KEYSTORE_PATH \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
            --no-daemon

      - name: Upload AAB Release (Client)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-release-${{ github.run_number }}
          path: mobile/client/android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

