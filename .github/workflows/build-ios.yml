name: Build iOS — MAWEJA Client

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Type de build'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

env:
  NODE_VERSION: '20'

jobs:
  # ══════════════════════════════════════════════════════
  #  APP CLIENT — com.edcorp.maweja (iOS)
  # ══════════════════════════════════════════════════════
  build-client-ios:
    name: "MAWEJA Client — iOS IPA"
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Installer CocoaPods
        run: sudo gem install cocoapods

      - name: Installer les dépendances racine
        run: npm install

      - name: Build Vite — App Client (maweja.net)
        env:
          VITE_MOBILE_MODE: client
          VITE_API_BASE_URL: https://maweja.net
        run: npx vite build --config vite.mobile.config.ts

      - name: Installer les dépendances Capacitor (Client)
        working-directory: mobile/client
        run: npm install

      - name: Initialiser la plateforme iOS
        working-directory: mobile/client
        run: npx cap add ios

      - name: Synchroniser Capacitor iOS
        working-directory: mobile/client
        run: npx cap sync ios

      # ── Icônes MAWEJA iOS ──
      - name: Générer les icônes iOS MAWEJA
        run: |
          ICON_SRC="client/public/logo.png"
          ICONSET="mobile/client/ios/App/App/Assets.xcassets/AppIcon.appiconset"
          mkdir -p "$ICONSET"

          # Toutes les tailles requises par Apple
          declare -A ICONS=(
            ["Icon-20@1x.png"]=20
            ["Icon-20@2x.png"]=40
            ["Icon-20@3x.png"]=60
            ["Icon-29@1x.png"]=29
            ["Icon-29@2x.png"]=58
            ["Icon-29@3x.png"]=87
            ["Icon-40@1x.png"]=40
            ["Icon-40@2x.png"]=80
            ["Icon-40@3x.png"]=120
            ["Icon-60@2x.png"]=120
            ["Icon-60@3x.png"]=180
            ["Icon-76@1x.png"]=76
            ["Icon-76@2x.png"]=152
            ["Icon-83.5@2x.png"]=167
            ["Icon-1024.png"]=1024
          )

          for filename in "${!ICONS[@]}"; do
            SIZE=${ICONS[$filename]}
            sips -z $SIZE $SIZE "$ICON_SRC" --out "$ICONSET/$filename" > /dev/null 2>&1
          done

          # Générer Contents.json pour le bundle Xcode
          cat > "$ICONSET/Contents.json" << 'CONTENTS_EOF'
          {
            "images": [
              { "filename": "Icon-20@1x.png",   "idiom": "iphone", "scale": "1x", "size": "20x20"   },
              { "filename": "Icon-20@2x.png",   "idiom": "iphone", "scale": "2x", "size": "20x20"   },
              { "filename": "Icon-20@3x.png",   "idiom": "iphone", "scale": "3x", "size": "20x20"   },
              { "filename": "Icon-29@1x.png",   "idiom": "iphone", "scale": "1x", "size": "29x29"   },
              { "filename": "Icon-29@2x.png",   "idiom": "iphone", "scale": "2x", "size": "29x29"   },
              { "filename": "Icon-29@3x.png",   "idiom": "iphone", "scale": "3x", "size": "29x29"   },
              { "filename": "Icon-40@1x.png",   "idiom": "iphone", "scale": "1x", "size": "40x40"   },
              { "filename": "Icon-40@2x.png",   "idiom": "iphone", "scale": "2x", "size": "40x40"   },
              { "filename": "Icon-40@3x.png",   "idiom": "iphone", "scale": "3x", "size": "40x40"   },
              { "filename": "Icon-60@2x.png",   "idiom": "iphone", "scale": "2x", "size": "60x60"   },
              { "filename": "Icon-60@3x.png",   "idiom": "iphone", "scale": "3x", "size": "60x60"   },
              { "filename": "Icon-20@1x.png",   "idiom": "ipad",   "scale": "1x", "size": "20x20"   },
              { "filename": "Icon-20@2x.png",   "idiom": "ipad",   "scale": "2x", "size": "20x20"   },
              { "filename": "Icon-29@1x.png",   "idiom": "ipad",   "scale": "1x", "size": "29x29"   },
              { "filename": "Icon-29@2x.png",   "idiom": "ipad",   "scale": "2x", "size": "29x29"   },
              { "filename": "Icon-40@1x.png",   "idiom": "ipad",   "scale": "1x", "size": "40x40"   },
              { "filename": "Icon-40@2x.png",   "idiom": "ipad",   "scale": "2x", "size": "40x40"   },
              { "filename": "Icon-76@1x.png",   "idiom": "ipad",   "scale": "1x", "size": "76x76"   },
              { "filename": "Icon-76@2x.png",   "idiom": "ipad",   "scale": "2x", "size": "76x76"   },
              { "filename": "Icon-83.5@2x.png", "idiom": "ipad",   "scale": "2x", "size": "83.5x83.5"},
              { "filename": "Icon-1024.png",    "idiom": "ios-marketing", "scale": "1x", "size": "1024x1024"}
            ],
            "info": { "author": "xcode", "version": 1 }
          }
          CONTENTS_EOF

          echo "✓ Icônes iOS MAWEJA générées"

      # ── Permissions iOS (Info.plist) ──
      - name: Injecter les permissions iOS (Info.plist)
        working-directory: mobile/client/ios/App/App
        run: |
          PLIST="Info.plist"

          inject_plist() {
            local key="$1"
            local value="$2"
            /usr/libexec/PlistBuddy -c "Delete :$key" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Add :$key string '$value'" "$PLIST"
          }

          inject_plist "NSLocationWhenInUseUsageDescription" \
            "MAWEJA utilise votre position pour trouver les restaurants et livreurs proches de vous."

          inject_plist "NSLocationAlwaysAndWhenInUseUsageDescription" \
            "MAWEJA utilise votre position en arrière-plan pour suivre votre livraison en temps réel."

          inject_plist "NSLocationAlwaysUsageDescription" \
            "MAWEJA utilise votre position pour le suivi de livraison."

          inject_plist "NSCameraUsageDescription" \
            "MAWEJA utilise la caméra pour votre photo de profil et les photos de livraison."

          inject_plist "NSPhotoLibraryUsageDescription" \
            "MAWEJA accède à vos photos pour votre photo de profil."

          inject_plist "NSPhotoLibraryAddUsageDescription" \
            "MAWEJA peut sauvegarder des photos dans votre galerie."

          inject_plist "NSMicrophoneUsageDescription" \
            "MAWEJA peut utiliser le microphone pour les appels avec les livreurs."

          echo "✓ Permissions iOS injectées dans Info.plist"

      # ── Build Debug (simulateur, sans signing) ──
      - name: Build Debug iOS
        if: ${{ github.event.inputs.build_type == 'debug' }}
        working-directory: mobile/client/ios/App
        run: |
          xcodebuild build \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true
          echo "✓ Build Debug iOS terminé"

      # ── Build Release (App Store) ──
      - name: Importer le certificat Apple (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: maweja-keychain-2026
        run: |
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -t 3600 -u build.keychain

          echo "$BUILD_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(grep -a -A 1 "UUID" profile.mobileprovision | tail -1 | sed 's/.*<string>\(.*\)<\/string>.*/\1/')
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/${PROFILE_UUID}.mobileprovision

      - name: Archive iOS (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        working-directory: mobile/client/ios/App
        run: |
          xcodebuild archive \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/maweja-client.xcarchive \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM=${{ secrets.IOS_TEAM_ID }} \
            PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISION_PROFILE_NAME }}" \
            | xcpretty || true

      - name: Exporter IPA (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST_EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>TEAM_ID_PLACEHOLDER</string>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST_EOF
          sed -i '' "s/TEAM_ID_PLACEHOLDER/${{ secrets.IOS_TEAM_ID }}/" $RUNNER_TEMP/ExportOptions.plist

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/maweja-client.xcarchive \
            -exportPath $RUNNER_TEMP/maweja-client-ipa \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            | xcpretty || true

      - name: Upload IPA (Release)
        if: ${{ github.event.inputs.build_type == 'release' }}
        uses: actions/upload-artifact@v4
        with:
          name: maweja-client-ios-release-${{ github.run_number }}
          path: ${{ runner.temp }}/maweja-client-ipa/*.ipa
          retention-days: 90

      - name: Nettoyer keychain temporaire
        if: always()
        run: security delete-keychain build.keychain 2>/dev/null || true
