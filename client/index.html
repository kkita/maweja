<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#EC0000" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>MAWEJA - Livraison Kinshasa</title>
    <meta name="description" content="MAWEJA - Service de livraison de repas a Kinshasa, RDC. Commandez vos plats preferes en quelques clics." />
    <meta property="og:title" content="MAWEJA - Livraison Kinshasa" />
    <meta property="og:description" content="Service de livraison ultra-rapide a Kinshasa" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta property="og:image" content="/icon-512.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Montserrat:wght@700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  </head>
  <body style="margin:0;padding:0;background:#EC0000;min-height:100vh;">
    <div id="maweja-native-splash" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#EC0000;z-index:99999;transition:opacity 0.2s ease;pointer-events:none;"></div>
    <div id="root" style="background:#EC0000;min-height:100vh;"></div>
    <script>
      // Centralized splash killer — usable from anywhere
      window.__mawejaKillSplash = function() {
        if (window.__MAWEJA_SPLASH_TIMER__) { clearTimeout(window.__MAWEJA_SPLASH_TIMER__); window.__MAWEJA_SPLASH_TIMER__ = null; }
        var el = document.getElementById('maweja-native-splash');
        if (el) {
          el.style.opacity = '0';
          setTimeout(function() { if (el.parentNode) el.parentNode.removeChild(el); }, 300);
        }
      };
      // Hard safety net: 9s max — laisse au Lottie (5s) + React le temps de prendre la main
      window.__MAWEJA_SPLASH_TIMER__ = setTimeout(window.__mawejaKillSplash, 9000);
      // Surface any uncaught errors visibly so the user reports something useful instead of a blank screen
      window.addEventListener('error', function(ev) {
        try {
          var box = document.createElement('div');
          box.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:#000;color:#fff;font:12px monospace;padding:10px;z-index:1000000;max-height:40vh;overflow:auto;';
          box.textContent = '[JS Error] ' + (ev.message || ev.error) + ' @ ' + (ev.filename || '') + ':' + (ev.lineno || '');
          document.body.appendChild(box);
        } catch(_) {}
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
